name: Deploy Telegram Bot Platform

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Typecheck
        run: npm run typecheck
      - name: Build admin and worker
        run: npm run build
      - name: Deploy to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          BOT_REGISTRY_ID: ${{ secrets.BOT_REGISTRY_ID }}
          SESSION_KV_ID: ${{ secrets.SESSION_KV_ID }}
          KEYS_KV_ID: ${{ secrets.KEYS_KV_ID }}
          SETTINGS_KV_ID: ${{ secrets.SETTINGS_KV_ID }}
      - name: Verify remote health
        run: npm run verify:remote
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
